<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Room - SFU</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container" style="margin-top: 40px; margin-bottom: 100px;">
    <!-- Room Header -->
    <div class="room-header">
      <div style="display: flex; flex-direction: column; gap: 6px;">
        <h2 id="roomTitle" style="margin-bottom: 0; border-bottom: none; padding-bottom: 0;">Room</h2>
        <div id="roomInfo" class="room-info"></div>
      </div>
      <div class="room-actions">
        <button id="toggleVideo" class="btn-control active" onclick="toggleVideo()">Video Off</button>
        <button id="toggleAudio" class="btn-control active" onclick="toggleAudio()">Audio Off</button>
        <button id="shareScreen" class="btn-control" onclick="toggleScreenShare()">Share Screen</button>
        <button id="quitBtn" class="btn-danger" onclick="quit()">Leave Room</button>
      </div>
    </div>
    
    <div class="room-content-wrapper" id="roomContentWrapper">
      <!-- Upper Layout: User Video -->
      <div class="upper-layout" id="upperLayout">
        <!-- Local Camera Feed (User Window) -->
        <div class="video-card local-card">
          <h3>Your Video</h3>
          <div class="video-wrapper local-video-wrapper" style="position: relative;">
            <video id="local" autoplay playsinline muted></video>
            <div class="peer-label">You</div>
            <button class="fullscreen-btn" onclick="toggleFullScreen(this)" title="Fullscreen">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Bottom Layout: Remote Feeds Grid (Participants Window) -->
      <div class="video-card participants-card">
        <h3>Participants</h3>
        <div class="participants-scroll-container">
          <div id="remotes" class="participants-grid"></div>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <p>Follow creator on 
      <a href="http://www.linkedin.com/in/viraj-rathod-058ba4280" target="_blank" rel="noopener">LinkedIn</a> and 
      <a href="https://github.com/RathodViraj" target="_blank" rel="noopener">GitHub</a>
    </p>
  </footer>

  <script>
    let pc, ws, pendingIce = []
    let localStream
    let videoTrack, audioTrack
    let screenStream = null
    let screenTrack = null
    let originalVideoTrack = null
    const remoteStreams = new Map()

    // Helper to get room details from URL
    const urlParams = new URLSearchParams(window.location.search)
    const roomId = urlParams.get('room')
    const title = urlParams.get('title') || ''
    const meetingType = urlParams.get('type') || ''

    if (!roomId) {
      alert('No room specified')
      window.location.href = '/index.html'
    }

    const baseURL = "https://discuss-hkih.onrender.com/"

    document.getElementById('roomTitle').textContent = title || `Room: ${roomId}`
    
    // Render info box and copy link button initially
    if (meetingType) {
      document.getElementById('roomInfo').innerHTML = `
        <span class="room-badge badge-${meetingType}">${meetingType}</span>
        <span>ID: <strong id="roomIdVal">${escapeHTML(roomId)}</strong></span>
        <button class="btn-copy" onclick="copyJoinLink()" title="Copy room invite link">Copy Link</button>
      `
    } else {
      document.getElementById('roomInfo').innerHTML = `
        <span>Room ID: <strong id="roomIdVal">${escapeHTML(roomId)}</strong></span>
        <button class="btn-copy" onclick="copyJoinLink()" title="Copy room invite link">Copy Link</button>
      `
    }
  
    async function fetchRoomInfo(roomId) {
      try {
        const response = await fetch(`${baseURL}room-info?roomID=${encodeURIComponent(roomId)}`);
        if (!response.ok) throw new Error('Failed to fetch room info');
        const info = await response.json();
        
        if (info.title) {
          document.getElementById('roomTitle').textContent = info.title;
        }
        if (info.meetingType) {
          document.getElementById('roomInfo').innerHTML = `
            <span class="room-badge badge-${info.meetingType}">${info.meetingType}</span>
            <span>ID: <strong id="roomIdVal">${escapeHTML(roomId)}</strong></span>
            <button class="btn-copy" onclick="copyJoinLink()" title="Copy room invite link">Copy Link</button>
          `;
        }
      } catch (err) {
        console.warn('Could not load room info from server:', err);
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      join(roomId, title, meetingType);
      fetchRoomInfo(roomId);
    });

    async function join(roomName, title = '', meetingType = '') {
      if (pc && pc.connectionState !== 'closed') return;
      
      // 1. Get User Media
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('local').srcObject = localStream
        videoTrack = localStream.getVideoTracks()[0]
        audioTrack = localStream.getAudioTracks()[0]
      } catch (e) {
        console.error("Could not get user media", e)
        return
      }

      // 2. Create Peer Connection
      pc = new RTCPeerConnection({
        iceServers: [
          { urls: ["stun:stun.l.google.com:19302", "stun:stun.relay.metered.ca:80"] },
          {
            urls: ["turn:openrelay.metered.ca:80"],
            username: "openrelayproject",
            credential: "openrelayproject",
          },
          {
        urls: "turn:global.relay.metered.ca:80",
        username: "f358091188d50dfcfc0a96ce",
        credential: "7cHWPVPt4N2vedaP",
      },
      {
        urls: "turn:global.relay.metered.ca:80?transport=tcp",
        username: "f358091188d50dfcfc0a96ce",
        credential: "7cHWPVPt4N2vedaP",
      },
      {
        urls: "turn:global.relay.metered.ca:443",
        username: "f358091188d50dfcfc0a96ce",
        credential: "7cHWPVPt4N2vedaP",
      },
      {
        urls: "turns:global.relay.metered.ca:443?transport=tcp",
        username: "f358091188d50dfcfc0a96ce",
        credential: "7cHWPVPt4N2vedaP",
      },
    ],
    iceTransportPolicy: "relay"
  })

      // 3. Add Local Tracks
      localStream.getTracks().forEach(t => pc.addTrack(t, localStream))

      // Debug hooks
      // pc.oniceconnectionstatechange = () => console.log("ICE connection state:", pc.iceConnectionState)
      // pc.onconnectionstatechange = () => console.log("Connection state:", pc.connectionState)
      // pc.onicegatheringstatechange = () => console.log("ICE gathering state:", pc.iceGatheringState)

      // 4. Handle ICE candidates
      pc.onicecandidate = e => {
        if (e.candidate && ws.readyState === WebSocket.OPEN) {
          // console.log("Sending ICE candidate:", e.candidate.candidate)
          ws.send(JSON.stringify({type:"ice", candidate:e.candidate}))
        }
      }

      // 5. Handle Incoming remote tracks
      pc.ontrack = e => {
        if (!e.streams || e.streams.length === 0) return

        const stream = e.streams[0]
        const peerId = stream.id 
        const kind = e.track.kind
        
        // console.log(`Received ${kind} track for peer ${peerId}, stream has ${stream.getTracks().length} tracks`)

        let container = remoteStreams.get(peerId)
        
        if (!container) {
          // Create Peer UI wrapper card
          const wrapper = document.createElement('div')
          wrapper.id = 'peer-' + peerId
          wrapper.className = 'peer-wrapper'
          
          const video = document.createElement('video')
          video.autoplay = true
          video.playsInline = true
          video.srcObject = stream
          
          // Fullscreen Trigger button
          const fsBtn = document.createElement('button')
          fsBtn.className = 'fullscreen-btn'
          fsBtn.title = 'Fullscreen'
          fsBtn.innerHTML = `
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
            </svg>`
          fsBtn.onclick = () => toggleFullScreen(fsBtn)
          
          // Add screen share status text overlay
          const indicator = document.createElement('div')
          indicator.className = 'screen-indicator'
          indicator.innerHTML = `
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block; vertical-align:middle; margin-right:3px;">
              <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
            </svg>
            <span>Screen</span>
          `
          indicator.style.display = 'none'

          // Name label
          const label = document.createElement('div')
          label.className = 'peer-label'
          label.textContent = `Peer ${peerId.substring(0, 6)}`
          
          wrapper.appendChild(video)
          wrapper.appendChild(indicator)
          wrapper.appendChild(label)
          wrapper.appendChild(fsBtn)
          document.getElementById('remotes').appendChild(wrapper)
          
          container = { wrapper, video, stream, volume: 0, audioCtx: null, analyser: null, indicator }
          remoteStreams.set(peerId, container)
          
          // Size change tracking
          video.addEventListener('resize', () => {
            if (video.videoWidth > 1200) {
              if (container.indicator) container.indicator.style.display = 'flex';
            } else {
              if (container.indicator) container.indicator.style.display = 'none';
            }
          });
          
          // Force play
          setTimeout(() => {
            video.play().catch(err => console.log("Autoplay blocked:", err))
          }, 100)
        } else {
          // console.log(`Updating stream for peer ${peerId}`)
          container.stream = stream
          container.video.srcObject = stream
          
          setTimeout(() => {
            container.video.play().catch(err => console.log("Autoplay blocked:", err))
          }, 100)
        }
        
        // Initial checks on incoming track
        if (kind === 'video') {
          e.track.onended = () => {
            if (container.indicator) container.indicator.style.display = 'none'
          }
          
          const settings = e.track.getSettings()
          if (settings.width > 1200 || settings.displaySurface === 'monitor') {
            if (container.indicator) container.indicator.style.display = 'flex'
          }
        }

        // Setup audio analysis
        if (kind === 'audio' && !container.analyser) {
          setupAudioAnalysis(stream, container)
        }
      }

      // 6. Connect WebSocket dynamically
      const backendBase = "discuss-hkih.onrender.com"
      let wsUrl = `wss://${backendBase}/ws?room=${encodeURIComponent(roomName)}&title=${encodeURIComponent(title)}&type=${encodeURIComponent(meetingType)}`
      ws = new WebSocket(wsUrl)

      ws.onopen = () => console.log("WebSocket connected")
      
      ws.onmessage = async e => {
        const msg = JSON.parse(e.data)

        if (msg.type === "offer") {
          await pc.setRemoteDescription(msg.sdp)
          const ans = await pc.createAnswer()
          await pc.setLocalDescription(ans)
          ws.send(JSON.stringify({type:"answer", sdp:pc.localDescription}))
          
          pendingIce.forEach(c => pc.addIceCandidate(c))
          pendingIce = []
        }
        else if (msg.type === "ice") {
          if (pc.remoteDescription) pc.addIceCandidate(msg.candidate)
          else pendingIce.push(msg.candidate)
        }
        else if (msg.type === "peer-left") {
          const id = msg.peerId
          const container = remoteStreams.get(id)
          if (container) {
            if (container.audioCtx) {
              container.audioCtx.close()
            }
            container.wrapper.remove()
            remoteStreams.delete(id)
          }
        }
        else if (msg.type === "room-ended") {
          alert(msg.message)
          quit()
        }
      }
    }

    // --- AUDIO LOGIC ---

    function setupAudioAnalysis(stream, container) {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
        const source = audioCtx.createMediaStreamSource(stream);
        const analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256; 
        source.connect(analyser);

        container.audioCtx = audioCtx;
        container.analyser = analyser;
        
        // console.log(`Audio analysis setup for peer ${stream.id}`);
      } catch(e) {
        console.error("Audio analysis failed:", e);
      }
    }

    // Polling loop for volume (every 100ms)
    setInterval(() => {
      remoteStreams.forEach(container => {
        if (!container.analyser) return;
        const data = new Uint8Array(container.analyser.frequencyBinCount);
        container.analyser.getByteFrequencyData(data);
        let sum = 0;
        for(let i=0; i<data.length; i++) sum += data[i];
        container.volume = sum / data.length;
      });
    }, 100);

    // Sorting and Speaker detection (solid border outline - every 500ms)
    setInterval(() => {
      const peers = Array.from(remoteStreams.values());
      peers.sort((a, b) => b.volume - a.volume);

      peers.forEach((container, index) => {
        if(container.wrapper) {
          container.wrapper.style.order = index;
          if(index === 0 && container.volume > 10) {
            container.wrapper.classList.add('active-speaker');
          } else {
            container.wrapper.classList.remove('active-speaker');
          }
        }
      });
    }, 500);

    // Toggles
    function toggleVideo() {
      if (videoTrack) {
        videoTrack.enabled = !videoTrack.enabled
        const btn = document.getElementById('toggleVideo')
        btn.textContent = videoTrack.enabled ? 'Video Off' : 'Video On'
        btn.classList.toggle('active', videoTrack.enabled)
      }
    }

    function toggleAudio() {
      if (audioTrack) {
        audioTrack.enabled = !audioTrack.enabled
        const btn = document.getElementById('toggleAudio')
        btn.textContent = audioTrack.enabled ? 'Audio Off' : 'Audio On'
        btn.classList.toggle('active', audioTrack.enabled)
      }
    }

    async function toggleScreenShare() {
      const btn = document.getElementById('shareScreen')
      
      if (screenStream) {
        stopScreenShare()
        btn.textContent = 'Share Screen'
        btn.classList.remove('active')
        return
      }
      
      try {
        screenStream = await navigator.mediaDevices.getDisplayMedia({ 
          video: { 
            cursor: "always",
            displaySurface: "monitor"
          }, 
          audio: false 
        })
        
        screenTrack = screenStream.getVideoTracks()[0]
        
        if (!originalVideoTrack) {
          originalVideoTrack = videoTrack
        }
        
        const senders = pc.getSenders()
        const videoSender = senders.find(sender => 
          sender.track && sender.track.kind === 'video'
        )
        
        if (videoSender) {
          await videoSender.replaceTrack(screenTrack)
          console.log('Screen sharing started')
          document.getElementById('local').srcObject = screenStream
          
          btn.textContent = 'Stop Sharing'
          btn.classList.add('active')
          
          screenTrack.onended = () => {
            stopScreenShare()
            btn.textContent = 'Share Screen'
            btn.classList.remove('active')
          }
        }
      } catch (err) {
        console.error('Screen share error:', err)
        alert('Could not start screen sharing: ' + err.message)
      }
    }

    function stopScreenShare() {
      if (!screenStream) return
      
      screenStream.getTracks().forEach(t => t.stop())
      
      const senders = pc.getSenders()
      const videoSender = senders.find(sender => 
        sender.track && sender.track.kind === 'video'
      )
      
      if (videoSender && originalVideoTrack) {
        videoSender.replaceTrack(originalVideoTrack)
        console.log('Screen sharing stopped, camera restored')
      }
      
      document.getElementById('local').srcObject = localStream
      screenStream = null
      screenTrack = null
    }

    // --- MAXIMIZE CONTROLS (CSS OVERLAY METHOD) ---

    function toggleFullScreen(btn) {
      const container = btn.closest('.peer-wrapper') || btn.closest('.video-card');
      if (!container) return;

      const isMaximized = container.classList.toggle('maximized');

      if (isMaximized) {
        btn.innerHTML = `
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px; display: inline-block; vertical-align: middle;">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg> Back`;
        btn.title = "Minimize";
        btn.classList.add('maximized-btn');
      } else {
        btn.innerHTML = `
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
          </svg>`;
        btn.title = "Maximize";
        btn.classList.remove('maximized-btn');
      }
    }



    // --- LINK CLIPBOARD COPY ---

    function copyJoinLink() {
      const joinUrl = window.location.origin + `/room.html?room=${encodeURIComponent(roomId)}`;
      navigator.clipboard.writeText(joinUrl).then(() => {
        const btn = document.querySelector('.btn-copy');
        const originalText = btn.textContent;
        btn.textContent = 'Copied!';
        btn.style.backgroundColor = '#10b981';
        btn.style.color = '#ffffff';
        btn.style.borderColor = 'transparent';
        
        setTimeout(() => {
          btn.textContent = originalText;
          btn.style.backgroundColor = '';
          btn.style.color = '';
          btn.style.borderColor = '';
        }, 2000);
      }).catch(err => {
        console.error('Failed to copy link:', err);
      });
    }

    function escapeHTML(str) {
      if (!str) return '';
      return str.replace(/[&<>'"]/g, 
        tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
      );
    }

    function quit() {
      if (screenStream) {
        screenStream.getTracks().forEach(t => t.stop())
      }
      if (localStream) localStream.getTracks().forEach(t => t.stop())
      if (pc) pc.close()
      if (ws) ws.close()
      remoteStreams.forEach(container => {
        if (container.audioCtx) container.audioCtx.close()
      })
      window.location.href = '/index.html'
    }
  </script>
</body>
</html>
